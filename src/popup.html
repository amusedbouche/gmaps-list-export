<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 360px;
      min-height: 120px;
      background: #fff;
      color: #202124;
    }
    header {
      background: #1a73e8;
      color: white;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #status {
      padding: 12px 16px;
      font-size: 13px;
      color: #5f6368;
      min-height: 36px;
    }
    #btn-extract {
      background: #1a73e8;
      color: white;
      width: calc(100% - 32px);
      margin: 0 16px 16px;
      padding: 10px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }
    #btn-extract:hover { opacity: .85; }
    #btn-extract:disabled { opacity: 0.6; cursor: not-allowed; }
    #results {
      display: none;
      padding: 0 16px 12px;
    }
    #controls {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      align-items: center;
    }
    #filter-input {
      flex: 1;
      padding: 6px 9px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      color: #202124;
    }
    #filter-input:focus { border-color: #1a73e8; }
    #zip-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      align-items: center;
    }
    #zip-input {
      width: 72px;
      padding: 6px 9px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      color: #202124;
    }
    #zip-input:focus { border-color: #1a73e8; }
    #radius-select {
      padding: 6px 6px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font-size: 12px;
      color: #202124;
      background: #fff;
      outline: none;
      cursor: pointer;
    }
    #btn-zip {
      flex: 1;
      padding: 6px 10px;
      background: #f1f3f4;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: #202124;
    }
    #btn-zip:hover { background: #e8eaed; }
    #btn-zip.active { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; }
    #sort-select {
      padding: 6px 6px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font-size: 12px;
      color: #202124;
      background: #fff;
      outline: none;
      cursor: pointer;
    }
    #sort-select:focus { border-color: #1a73e8; }
    #count {
      font-size: 11px;
      color: #5f6368;
      margin-bottom: 6px;
    }
    #preview {
      max-height: 220px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 4px 0;
      background: #f8f9fa;
      margin-bottom: 10px;
    }
    .place-item {
      padding: 6px 10px;
      border-bottom: 1px solid #ececec;
      font-size: 12px;
      line-height: 1.4;
    }
    .place-item:last-child { border-bottom: none; }
    .place-name {
      font-weight: 600;
      color: #202124;
    }
    .place-addr {
      color: #5f6368;
      font-size: 11px;
      margin-top: 1px;
    }
    .place-note {
      color: #188038;
      font-size: 11px;
      margin-top: 1px;
    }
    .place-link {
      font-size: 11px;
      color: #1a73e8;
      text-decoration: none;
      margin-top: 2px;
      display: inline-block;
    }
    .place-link:hover { text-decoration: underline; }
    .btn-row {
      display: flex;
      gap: 6px;
    }
    button {
      flex: 1;
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    #btn-copy { background: #1a73e8; color: white; }
    #btn-csv  { background: #34a853; color: white; }
  </style>
</head>
<body>
  <header>📍 Maps List Extractor</header>
  <div id="status">Open a Google Maps list, then click Extract.</div>
  <button id="btn-extract">Extract Places</button>
  <div id="results">
    <div id="zip-row">
      <input id="zip-input" type="text" placeholder="ZIP or city" maxlength="20" />
      <select id="radius-select">
        <option value="1">1 mi</option>
        <option value="5" selected>5 mi</option>
        <option value="10">10 mi</option>
        <option value="25">25 mi</option>
      </select>
      <button id="btn-zip">Filter by area</button>
      <button id="btn-zip-clear" title="Clear area filter" style="display:none;padding:2px 6px!important;background:#f1f3f4;border:1px solid #dadce0;border-radius:6px;font-size:11px;cursor:pointer;color:#5f6368;flex:none;">✕</button>
    </div>
    <div id="controls">
      <input id="filter-input" type="text" placeholder="Search places…" />
      <select id="sort-select">
        <option value="default">Original order</option>
        <option value="name-asc">Name A–Z</option>
        <option value="name-desc">Name Z–A</option>
        <option value="distance">Nearest first</option>
      </select>
    </div>
    <div id="count"></div>
    <div id="preview"></div>
    <div class="btn-row">
      <button id="btn-copy">Copy Text</button>
      <button id="btn-csv">Download CSV</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
