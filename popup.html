<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 360px;
      min-height: 120px;
      background: #fff;
      color: #202124;
    }
    header {
      background: #1a73e8;
      color: white;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #status {
      padding: 12px 16px;
      font-size: 13px;
      color: #5f6368;
      min-height: 36px;
    }
    #btn-extract {
      background: #1a73e8;
      color: white;
      width: calc(100% - 32px);
      margin: 0 16px 16px;
      padding: 10px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }
    #btn-extract:hover { opacity: .85; }
    #btn-extract:disabled { opacity: 0.6; cursor: not-allowed; }
    #results {
      display: none;
      padding: 0 16px 12px;
    }
    #count {
      font-size: 11px;
      color: #5f6368;
      margin-bottom: 6px;
    }
    #preview {
      max-height: 240px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 8px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.5;
      background: #f8f9fa;
      white-space: pre-wrap;
      margin-bottom: 12px;
    }
    .btn-row {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    #btn-copy { background: #1a73e8; color: white; }
    #btn-csv { background: #34a853; color: white; }
  </style>
</head>
<body>
  <header>📍 Maps List Extractor</header>
  <div id="status">Open a Google Maps list, then click Extract.</div>
  <button id="btn-extract">Extract Places</button>
  <div id="results">
    <div id="count"></div>
    <div id="preview"></div>
    <div class="btn-row">
      <button id="btn-copy">Copy Text</button>
      <button id="btn-csv">Download CSV</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
